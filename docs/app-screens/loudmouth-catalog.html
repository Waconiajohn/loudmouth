<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LOUDMOUTH — Free Song Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@400;500&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060606; --surface:#0e0e0e; --surface2:#141414; --surface3:#1c1c1c;
  --red:#c8151b; --amber:#f59e0b; --ember:#e85d04; --teal:#0d9488;
  --indigo:#6366f1; --green:#22c55e; --pink:#f472b6;
  --white:#f4f0ea; --dim:rgba(244,240,234,0.88); --dimmer:rgba(244,240,234,0.60);
  --border:rgba(255,255,255,0.07); --border-bright:rgba(255,255,255,0.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;}
body{max-width:600px;margin:0 auto;padding-bottom:80px;}

/* ── HEADER ── */
.cat-header{
  padding:40px 20px 24px;
  background:linear-gradient(to bottom,rgba(200,21,27,0.07),transparent);
  border-bottom:1px solid var(--border);
}
.cat-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.06em;margin-bottom:2px;}
.cat-logo em{color:var(--red);font-style:normal;}
.cat-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,7vw,48px);letter-spacing:0.03em;line-height:0.95;margin-bottom:8px;}
.cat-title em{color:var(--amber);font-style:normal;}
.cat-sub{font-size:14px;color:var(--dim);line-height:1.6;margin-bottom:16px;}
.cat-sub strong{color:var(--white);font-weight:500;}

/* Stats bar */
.stats-row{display:flex;gap:20px;flex-wrap:wrap;}
.stat-item{text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amber);line-height:1;}
.stat-label{font-size:10px;color:var(--dimmer);letter-spacing:0.12em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}

/* ── SEARCH ── */
.search-bar{
  padding:16px 20px;
  position:sticky;top:0;z-index:100;
  background:rgba(6,6,6,0.96);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.search-inner{position:relative;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--dimmer);pointer-events:none;}
.search-input{
  width:100%;padding:12px 16px 12px 42px;
  background:var(--surface2);border:1px solid var(--border-bright);
  border-radius:10px;color:var(--white);font-family:'Barlow',sans-serif;
  font-size:15px;outline:none;transition:border-color 0.15s;
}
.search-input:focus{border-color:var(--amber);}
.search-input::placeholder{color:var(--dimmer);}
.search-count{
  font-size:11px;color:var(--dimmer);font-family:'Barlow Condensed',sans-serif;
  letter-spacing:0.08em;text-transform:uppercase;margin-top:8px;
}

/* ── FILTER TABS ── */
.filter-section{padding:14px 20px 0;}
.filter-row{
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  padding-bottom:10px;
}
.filter-row::-webkit-scrollbar{display:none;}
.filter-tab{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  padding:6px 14px;border-radius:100px;border:1px solid var(--border);
  color:var(--dimmer);background:transparent;cursor:pointer;
  white-space:nowrap;transition:all 0.12s;flex-shrink:0;
}
.filter-tab:hover{color:var(--white);border-color:var(--border-bright);}
.filter-tab.active{color:#000;border-color:transparent;}
.filter-tab.mode-all.active{background:var(--white);color:#000;}
.filter-tab.mode-rising.active{background:var(--pink);}
.filter-tab.mode-teen.active{background:var(--red);}
.filter-tab.mode-adult.active{background:var(--amber);}
.filter-tab.mode-senior.active{background:var(--teal);}
.filter-tab.mode-lang.active{background:var(--indigo);}

.filter-row-2{margin-top:0;}

/* Language filter chips */
.lang-filter-row{
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  padding:8px 20px 0;
}
.lang-filter-row::-webkit-scrollbar{display:none;}
.lang-chip{
  display:flex;align-items:center;gap:5px;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;
  font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  padding:5px 12px;border-radius:100px;border:1px solid var(--border);
  color:var(--dimmer);background:transparent;cursor:pointer;
  white-space:nowrap;transition:all 0.12s;flex-shrink:0;
}
.lang-chip:hover{color:var(--white);border-color:var(--border-bright);}
.lang-chip.active{background:rgba(99,102,241,0.15);border-color:var(--indigo);color:var(--indigo);}
.lang-chip .lc-flag{font-size:14px;}

/* ── GENRE SECTION HEADERS ── */
.genre-section{margin-bottom:4px;}
.genre-header{
  padding:16px 20px 8px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;
}
.genre-header-left{display:flex;align-items:center;gap:10px;}
.genre-icon{font-size:18px;}
.genre-name{
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.06em;
}
.genre-count{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--dimmer);
}
.genre-chevron{color:var(--dimmer);font-size:16px;transition:transform 0.2s;}
.genre-section.collapsed .genre-chevron{transform:rotate(-90deg);}
.genre-body{padding:0 20px 8px;}
.genre-section.collapsed .genre-body{display:none;}

/* ── SONG ROWS ── */
.song-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;transition:background 0.1s;
}
.song-row:last-child{border-bottom:none;}
.song-row:hover{margin:0 -20px;padding-left:20px;padding-right:20px;background:rgba(255,255,255,0.03);border-radius:8px;}

.song-emoji{font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.song-info{flex:1;min-width:0;}
.song-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:600;
  font-size:15px;letter-spacing:0.02em;color:var(--white);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.song-artist{font-size:11px;color:var(--dimmer);margin-top:1px;}
.song-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.song-tag{
  font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
  font-family:'Barlow Condensed',sans-serif;padding:2px 6px;border-radius:3px;
}


.tag-lang{background:rgba(13,148,136,0.1);color:var(--teal);border:1px solid rgba(13,148,136,0.2);}
.tag-diff-easy{background:rgba(34,197,94,0.08);color:rgba(34,197,94,0.8);border:1px solid rgba(34,197,94,0.15);}
.tag-diff-med{background:rgba(245,158,11,0.08);color:rgba(245,158,11,0.8);border:1px solid rgba(245,158,11,0.15);}
.tag-diff-hard{background:rgba(200,21,27,0.08);color:rgba(200,21,27,0.8);border:1px solid rgba(200,21,27,0.15);}

.song-meta-right{
  display:flex;flex-direction:column;align-items:flex-end;gap:3px;
  flex-shrink:0;
}
.song-duration{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--dimmer);}
.song-modes{display:flex;gap:3px;}
.mode-dot{
  width:6px;height:6px;border-radius:50%;
  flex-shrink:0;
}
.md-rising{background:var(--pink);}
.md-teen{background:var(--red);}
.md-adult{background:var(--amber);}
.md-senior{background:var(--teal);}
.md-lang{background:var(--indigo);}


/* ── EMPTY STATE ── */
.empty-state{
  text-align:center;padding:60px 20px;
  font-size:15px;color:var(--dimmer);line-height:1.6;
}
.empty-state .es-icon{font-size:40px;margin-bottom:16px;}
</style>
</head>

<!-- HEADER -->
<div class="cat-header">

  <div class="lang-filter-row" id="lang-filters">

// ─── STATE ───────────────────────────────────────────────────────
let activeMode = 'all';
let activeLang = 'all';
let searchQuery = '';

// ─── COUNT STATS ─────────────────────────────────────────────────
function countAll() {
  let total = 0, genres = 0;
  CATALOG.forEach(g => { total += g.songs.length; genres++; });
  document.getElementById('total-count').textContent = total.toLocaleString();
  document.getElementById('genre-count').textContent = genres;
  document.getElementById('search-count').textContent = `${total} songs available`;
}

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('catalog-container');
  container.innerHTML = '';
  let totalShown = 0;

  CATALOG.forEach(genre => {
    const filteredSongs = genre.songs.filter(song => {
      // Mode filter
      if (activeMode !== 'all' && !song.modes.includes(activeMode)) return false;
      // Lang filter
      if (activeLang !== 'all' && song.lang !== activeLang) return false;
      // Search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        if (!song.t.toLowerCase().includes(q) &&
            !song.a.toLowerCase().includes(q) &&
            !genre.genre.toLowerCase().includes(q)) return false;
      }
      return true;
    });

    if (filteredSongs.length === 0) return;
    totalShown += filteredSongs.length;

    const section = document.createElement('div');
    section.className = 'genre-section';

    section.innerHTML = `
      <div class="genre-header" onclick="toggleGenre(this.parentElement)">
        <div class="genre-header-left">
          <div class="genre-icon">${genre.icon}</div>
          <div class="genre-name">${genre.genre}</div>
          <div class="genre-count">${filteredSongs.length} songs</div>
        </div>
        <div class="genre-chevron">›</div>
      </div>
      <div class="genre-body">${filteredSongs.map(s => songRow(s)).join('')}</div>
    `;
    container.appendChild(section);
  });

  // Update count
  document.getElementById('search-count').textContent =
    `${totalShown.toLocaleString()} song${totalShown !== 1 ? 's' : ''} shown`;

  if (totalShown === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">🔍</div>
        No songs match your filters.<br>Try adjusting the mode or language.
      </div>`;
  }
}

function songRow(s) {
  const diffTag = `<span class="song-tag tag-diff-${s.diff}">${s.diff}</span>`;
  const langTag = s.lang !== 'en'
    ? `<span class="song-tag tag-lang">${langLabel(s.lang)}</span>` : '';

  const modeDots = s.modes.map(m =>
    `<div class="mode-dot md-${m}" title="${m}"></div>`
  ).join('');

  return `
    <div class="song-row">
      <div class="song-emoji">${s.e}</div>
      <div class="song-info">
        <div class="song-title">${s.t}</div>
        <div class="song-artist">${s.a}</div>
        <div class="song-tags">${diffTag}${langTag}</div>
      </div>
      <div class="song-meta-right">
        <div class="song-duration">${s.dur}</div>
        <div class="song-modes">${modeDots}</div>
      </div>
    </div>`;
}

function langLabel(code) {
  const map = {
    es:'Spanish', fr:'French', de:'German', it:'Italian',
    ja:'Japanese', pt:'Portuguese', la:'Latin', multi:'Multi-lang'
  };
  return map[code] || code;
}

// ─── INTERACTIONS ────────────────────────────────────────────────
function toggleGenre(section) {
  section.classList.toggle('collapsed');
}

function setMode(mode, btn) {
  activeMode = mode;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setLang(lang, btn) {
  activeLang = lang;
  document.querySelectorAll('.lang-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterCatalog() {
  searchQuery = document.getElementById('search-input').value.trim();
  render();
}

// ─── INIT ────────────────────────────────────────────────────────
countAll();
render();
</script>
